name: legal-site

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  exact-upstream-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read the pinned Barycenter source commit
        id: source
        run: echo "commit=$(jq -r .upstream_commit legal/deployment-manifest.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: relux-works/barycenter
          ref: ${{ steps.source.outputs.commit }}
          path: .upstream-barycenter
      - uses: actions/setup-go@v5
        with:
          go-version-file: .upstream-barycenter/coordinator/go.mod
      - name: Require approved sources and exact generated bytes
        run: |
          cd .upstream-barycenter/coordinator
          go run ./cmd/policy-site-build \
            --repo-root .. \
            --pack ../docs/compliance/policy-pack-2026-07-14.json \
            --inputs ../docs/compliance/legal-ops-inputs.json \
            --output ../.. \
            --upstream-commit "${{ steps.source.outputs.commit }}" \
            --check \
            --require-proceed
